<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX AI Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

.container { max-width:1200px; margin:auto; padding:20px; }

h1 { margin:10px; }

#signal {
  padding:10px 18px;
  border-radius:999px;
  background:#1e293b;
  display:inline-block;
  margin-bottom:15px;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.card {
  background:#1e293b;
  padding:16px;
  border-radius:12px;
}

.value { font-size:22px; font-weight:bold; }

.chart {
  height:520px;
  margin:20px 0;
}

button {
  background:#2563eb;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>FX AI Intelligence System</h1>

<div id="signal">LOADING...</div>

<div class="grid">
  <div class="card">
    <div>USD/RUB</div>
    <div class="value" id="usd"></div>
  </div>

  <div class="card">
    <div>KRW/RUB</div>
    <div class="value" id="krw"></div>
  </div>

  <div class="card">
    <div>150만원 → RUB</div>
    <div class="value" id="krwToRub"></div>
  </div>

  <div class="card">
    <div>1000 USD → RUB</div>
    <div class="value" id="usdToRub"></div>
  </div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

<button onclick="location.reload()">Refresh</button>

</div>

<script>

function calc(bok, cbr){
  return bok / cbr;
}

function mean(arr){
  return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function std(arr){
  const m = mean(arr);
  return Math.sqrt(mean(arr.map(x=> (x-m)**2 )));
}

function trend(arr){
  return (arr.at(-1) - arr.at(0)) / arr.at(0);
}

function aiScore(t, v, vol){
  return Math.max(0,
    50 +
    t*2000 -
    vol*5
  );
}

function signal(s){
  if(s>75) return "🟢 STRONG BUY (환전 유리)";
  if(s>55) return "🟡 HOLD";
  return "🔴 WAIT";
}

fetch("rates.json?v="+Date.now())
.then(r=>r.json())
.then(data=>{

  const latest = data.at(-1);

  const series = data.map(d => calc(d.bok_usd_krw, d.cbr_usd_rub));

  const avg = mean(series.slice(-10));
  const vol = std(series.slice(-10));
  const t = trend(series.slice(-10));

  const score = aiScore(t, (series.at(-1)-avg)/avg, vol);

  document.getElementById("signal").innerText =
    signal(score) + " | Score: " + score.toFixed(1);

  document.getElementById("usd").innerText = latest.cbr_usd_rub.toFixed(2);

  const krwRub = calc(latest.bok_usd_krw, latest.cbr_usd_rub);

  document.getElementById("krw").innerText = krwRub.toFixed(2);

  document.getElementById("krwToRub").innerText =
    Math.round(1500000/krwRub).toLocaleString();

  document.getElementById("usdToRub").innerText =
    Math.round(1000*latest.cbr_usd_rub).toLocaleString();

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.map(d=>d.date),
      datasets:[
        {
          label:"USD/RUB",
          data:data.map(d=>d.cbr_usd_rub),
          borderColor:"orange"
        },
        {
          label:"KRW/RUB",
          data:data.map(d=>calc(d.bok_usd_krw,d.cbr_usd_rub)),
          borderColor:"cyan",
          yAxisID:"y1"
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{position:"left"},
        y1:{position:"right"}
      }
    }
  });

});

</script>

</body>
</html>
