<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX AI Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  text-align:center;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:24px;
}

h1 { margin-bottom:8px; }

.sub {
  color:#94a3b8;
  margin-bottom:14px;
}

#signal {
  padding:12px 22px;
  border-radius:999px;
  display:inline-block;
  margin-bottom:18px;
  font-weight:bold;
}

.buy { background:#14532d; color:#bbf7d0; }
.hold { background:#713f12; color:#fde68a; }
.wait { background:#7f1d1d; color:#fecaca; }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.card {
  background:#1e293b;
  padding:18px;
  border-radius:14px;
}

.card h3 {
  color:#94a3b8;
  margin:0 0 8px;
  font-size:15px;
}

.value {
  font-size:23px;
  font-weight:bold;
}

.note {
  color:#cbd5e1;
  font-size:13px;
  margin-top:6px;
}

.recommend {
  background:#111827;
  border-radius:14px;
  padding:16px;
  margin:18px 0;
  font-size:18px;
  font-weight:bold;
}

.chart-box {
  height:520px;
  background:#111827;
  border-radius:18px;
  padding:24px 42px;
  margin:20px 0;
}

button {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  margin:12px;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#111827;
  margin-top:20px;
  border-radius:12px;
  overflow:hidden;
}

th, td {
  padding:10px;
  border-bottom:1px solid #334155;
}

th { color:#94a3b8; }

@media(max-width:800px){
  .grid { grid-template-columns:repeat(2,1fr); }
  .chart-box { height:440px; padding:18px; }
}

@media(max-width:520px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>
<div class="container">

<h1>FX AI Intelligence System</h1>
<div class="sub" id="today">Loading...</div>

<div id="signal">Loading...</div>

<div class="grid">
  <div class="card">
    <h3>USD/RUB</h3>
    <div class="value" id="usdRub">-</div>
    <div class="note">ë‹¬ëں¬ â†’ ë£¨ë¸”</div>
  </div>

  <div class="card">
    <h3>KRW/RUB</h3>
    <div class="value" id="krwRub">-</div>
    <div class="note">1 RUB = ëھ‡ ى›گ</div>
  </div>

  <div class="card">
    <h3>150ë§Œى›گ â†’ RUB</h3>
    <div class="value" id="krwToRub">-</div>
    <div class="note" id="krwPeak">-</div>
  </div>

  <div class="card">
    <h3>1000 USD â†’ RUB</h3>
    <div class="value" id="usdToRub">-</div>
    <div class="note" id="usdPeak">-</div>
  </div>
</div>

<div class="recommend" id="recommendation">يŒگë‹¨ ى¤‘...</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<button onclick="location.href='?v=' + Date.now()">ًں”„ ىµœى‹  ëچ°ى‌´ي„° ë‹¤ى‹œ ë¶ˆëں¬ىک¤ê¸°</button>

<table>
<thead>
<tr>
  <th>Date</th>
  <th>USD/RUB</th>
  <th>KRW/RUB</th>
  <th>150ë§Œى›گâ†’RUB</th>
  <th>1000USDâ†’RUB</th>
  <th>Score</th>
  <th>Signal</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
function fmt(n, d=2){
  return Number(n).toLocaleString("ko-KR", {
    minimumFractionDigits:d,
    maximumFractionDigits:d
  });
}

function intFmt(n){
  return Math.round(Number(n)).toLocaleString("ko-KR");
}

fetch("rates.json?v=" + Date.now())
.then(r => r.json())
.then(data => {
  const latest = data[data.length - 1];

  const latestUsdRub = Number(latest.cbr_usd_rub ?? latest.usd_rub);
  const latestKrwRub = Number(latest.calc_rub_krw ?? latest.krw_rub);
  const latestKrwToRub = Number(latest.krw_1_5m_to_rub ?? 1500000 / latestKrwRub);
  const latestUsdToRub = Number(latest.usd_1000_to_rub ?? 1000 * latestUsdRub);

  document.getElementById("today").innerText = "ê¸°ى¤€ى‌¼: " + latest.date;

  document.getElementById("usdRub").innerText = fmt(latestUsdRub, 2);
  document.getElementById("krwRub").innerText = fmt(latestKrwRub, 2);
  document.getElementById("krwToRub").innerText = intFmt(latestKrwToRub) + " RUB";
  document.getElementById("usdToRub").innerText = intFmt(latestUsdToRub) + " RUB";

  const krwValues = data.map(d => Number(d.krw_1_5m_to_rub ?? 1500000 / (d.calc_rub_krw ?? d.krw_rub)));
  const usdValues = data.map(d => Number(d.usd_1000_to_rub ?? 1000 * (d.cbr_usd_rub ?? d.usd_rub)));

  const krwHigh = Math.max(...krwValues);
  const usdHigh = Math.max(...usdValues);

  const krwPct = latestKrwToRub / krwHigh * 100;
  const usdPct = latestUsdToRub / usdHigh * 100;

  document.getElementById("krwPeak").innerText =
    "10ى‌¼ ىµœê³  ëŒ€ë¹„ " + fmt(krwPct, 1) + "%";

  document.getElementById("usdPeak").innerText =
    "10ى‌¼ ىµœê³  ëŒ€ë¹„ " + fmt(usdPct, 1) + "%";

  const signalBox = document.getElementById("signal");
  const score = Number(latest.score ?? 60);
  const signal = latest.signal ?? "HOLD";

  signalBox.className = "";
  if (signal.includes("BUY") || score >= 70) {
    signalBox.classList.add("buy");
  } else if (signal.includes("WAIT") || score < 50) {
    signalBox.classList.add("wait");
  } else {
    signalBox.classList.add("hold");
  }

  signalBox.innerText = `${signal} | Score: ${score}`;

  let rec = "";
  if (krwPct > usdPct + 1) {
    rec = "ًں‡°ًں‡· ى›گي™” ي™کى „ ىڑ°ىœ„: 150ë§Œى›گ ê¸°ى¤€ ë£¨ë¸” ي™کى „ë ¥ى‌´ ëچ” ى¢‹ىٹµë‹ˆë‹¤.";
  } else if (usdPct > krwPct + 1) {
    rec = "ًں’µ ë‹¬ëں¬ ي™کى „ ىڑ°ىœ„: 1000ë‹¬ëں¬ ê¸°ى¤€ ë£¨ë¸” ي™کى „ë ¥ى‌´ ëچ” ى¢‹ىٹµë‹ˆë‹¤.";
  } else {
    rec = "âڑ–ï¸ڈ ى›گي™”ى™€ ë‹¬ëں¬ ي™کى „ ë§¤ë ¥ى‌´ ë¹„ىٹ·ي•©ë‹ˆë‹¤.";
  }

  document.getElementById("recommendation").innerText = rec;

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.map(d=>d.date),
      datasets:[
        {
          label:"USD/RUB",
          data:data.map(d=>Number(d.cbr_usd_rub ?? d.usd_rub)),
          borderColor:"#f59e0b",
          backgroundColor:"#f59e0b",
          tension:0.3,
          pointRadius:5
        },
        {
          label:"KRW/RUB",
          data:data.map(d=>Number(d.calc_rub_krw ?? d.krw_rub)),
          borderColor:"#06b6d4",
          backgroundColor:"#06b6d4",
          yAxisID:"y1",
          tension:0.3,
          pointRadius:5
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{left:40,right:50,top:20,bottom:20}},
      plugins:{
        legend:{labels:{color:"#e5e7eb"}},
        tooltip:{enabled:true}
      },
      scales:{
        x:{ticks:{color:"#cbd5e1", maxRotation:45, minRotation:45}},
        y:{position:"left", ticks:{color:"#f59e0b"}},
        y1:{position:"right", ticks:{color:"#06b6d4"}, grid:{drawOnChartArea:false}}
      }
    }
  });

  const table = document.getElementById("table");
  table.innerHTML = "";

  data.slice().reverse().forEach(d => {
    const usdRub = Number(d.cbr_usd_rub ?? d.usd_rub);
    const krwRub = Number(d.calc_rub_krw ?? d.krw_rub);
    const krwToRub = Number(d.krw_1_5m_to_rub ?? 1500000 / krwRub);
    const usdToRub = Number(d.usd_1000_to_rub ?? 1000 * usdRub);

    table.innerHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${fmt(usdRub,2)}</td>
        <td>${fmt(krwRub,2)}</td>
        <td>${intFmt(krwToRub)}</td>
        <td>${intFmt(usdToRub)}</td>
        <td>${d.score ?? "-"}</td>
        <td>${d.signal ?? "-"}</td>
      </tr>
    `;
  });
});
</script>
</body>
</html>
