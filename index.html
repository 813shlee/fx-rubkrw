<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Decision System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1 { margin-bottom:8px; }

#signal {
  padding:12px 18px;
  display:inline-block;
  border-radius:999px;
  margin:12px 0;
  font-weight:bold;
}

.buy { background:#14532d; color:#bbf7d0; }
.hold { background:#713f12; color:#fde68a; }
.wait { background:#7f1d1d; color:#fecaca; }

.grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:16px;
}

.card {
  background:#1e293b;
  padding:16px;
  border-radius:12px;
}

.card h3 {
  margin:0 0 8px;
  color:#94a3b8;
}

.value {
  font-size:22px;
  font-weight:bold;
}

.chart {
  height:520px;
  background:#111827;
  border-radius:16px;
  padding:20px;
  margin:20px 0;
}

.panel {
  background:#1e293b;
  padding:16px;
  border-radius:12px;
  margin-top:20px;
}

input {
  padding:10px;
  margin:6px;
  width:220px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.result {
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>FX Decision System</h1>

<div id="signal">Loading...</div>

<div class="grid">
  <div class="card">
    <h3>BOK USD/KRW</h3>
    <div class="value" id="bok">-</div>
  </div>

  <div class="card">
    <h3>CBR USD/RUB</h3>
    <div class="value" id="usdRub">-</div>
  </div>

  <div class="card">
    <h3>KRW/RUB</h3>
    <div class="value" id="krwRub">-</div>
  </div>

  <div class="card">
    <h3>150만원 → RUB</h3>
    <div class="value" id="krwToRub">-</div>
  </div>

  <div class="card">
    <h3>1000 USD → RUB</h3>
    <div class="value" id="usdToRub">-</div>
  </div>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

<div class="panel">
  <h2>실제 환전소 비교 (100,000 RUB 기준)</h2>

  <input id="usd" placeholder="USD → RUB (예: 73.8)">
  <input id="rub" placeholder="RUB → KRW (예: 20.9)">

  <br>

  <button onclick="calc()">비교 실행</button>

  <div class="result" id="result">입력 대기</div>
</div>

</div>

<script>

let latestGlobal = null;

fetch("rates.json?v=" + Date.now())
.then(r => r.json())
.then(data => {

  const latest = data.at(-1);
  latestGlobal = latest;

  const bok = latest.bok_usd_krw;
  const usdRub = latest.cbr_usd_rub;
  const krwRub = latest.calc_rub_krw;

  document.getElementById("bok").innerText = bok.toFixed(2);
  document.getElementById("usdRub").innerText = usdRub.toFixed(2);
  document.getElementById("krwRub").innerText = krwRub.toFixed(2);

  document.getElementById("krwToRub").innerText =
    Math.round(1500000 / krwRub).toLocaleString();

  document.getElementById("usdToRub").innerText =
    Math.round(1000 * usdRub).toLocaleString();

  new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels:data.map(d=>d.date),
      datasets:[
        {
          label:"USD/RUB",
          data:data.map(d=>d.cbr_usd_rub),
          borderColor:"orange"
        },
        {
          label:"KRW/RUB",
          data:data.map(d=>d.calc_rub_krw),
          borderColor:"cyan",
          yAxisID:"y1"
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

});

function calc() {

  const usdRub = Number(document.getElementById("usd").value);
  const rubKrw = Number(document.getElementById("rub").value);

  if (!usdRub || !rubKrw) {
    document.getElementById("result").innerText = "값 입력 필요";
    return;
  }

  const target = 100000;

  // KRW 경로
  const krwCost = target * rubKrw;

  // USD 경로
  const usdNeeded = target / usdRub;
  const usdCost = usdNeeded * latestGlobal.bok_usd_krw;

  let result = "";

  if (krwCost < usdCost) {
    result = "🇰🇷 원화 경로가 유리";
  } else {
    result = "💵 달러 경로가 유리";
  }

  result += ` | 차이: ${Math.abs(krwCost - usdCost).toLocaleString()} KRW`;

  document.getElementById("result").innerText = result;
}

</script>

</body>
</html>
