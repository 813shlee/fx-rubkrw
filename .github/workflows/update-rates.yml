name: Update FX Rates

on:
  workflow_dispatch:
  schedule:
    # Moscow Time (UTC+3)
    # 07:00 MSK = 04:00 UTC
    - cron: "0 4 * * *"

    # 15:00 MSK = 12:00 UTC
    - cron: "0 12 * * *"

concurrency:
  group: fx-rates-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update rates.json
        env:
          BOK_API_KEY: ${{ secrets.BOK_API_KEY }}
        run: |
          timeout 360s python -u update_rates.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rates.json

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update FX rates"

          for i in 1 2 3; do
            echo "Attempt $i"

            git fetch origin main
            git rebase origin/main || {
              git rebase --abort || true
              exit 1
            }

            if git push origin HEAD:main; then
              echo "Success"
              exit 0
            fi

            sleep 5
          done

          echo "Push failed."
          exit 1
